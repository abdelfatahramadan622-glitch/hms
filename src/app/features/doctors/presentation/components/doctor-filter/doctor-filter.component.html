<div class="card border-0 shadow-sm mb-4 filter-card">
  <div class="card-body p-3">
    <div [formGroup]="form" class="row g-2 align-items-end">
      <div class="col-12 col-md-5">
        <label class="form-label">بحث</label>
        <div class="input-group input-group-sm">
          <span class="input-group-text"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
          <input type="text" class="form-control border-start-0" formControlName="search" placeholder="اسم الطبيب، التخصص..." />
        </div>
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">الحالة</label>
        <select class="form-select form-select-sm" formControlName="status">
          <option value="">الكل</option>
          <option value="active">نشط</option>
          <option value="inactive">غير نشط</option>
          <option value="on-leave">إجازة</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">التخصص</label>
        <input type="text" class="form-control form-control-sm" formControlName="specialization" placeholder="القلب، العظام..." />
      </div>
      <div class="col-12 col-md-2">
        @if (hasActive) {
          <button type="button" class="btn btn-sm reset-btn w-100" (click)="reset()">
            <i class="fa-solid fa-filter-circle-xmark" style="margin-left:0.3rem;"></i>مسح
          </button>
        }
      </div>
    </div>
  </div>
</div>
