<div class="d-flex align-items-center justify-content-between mb-4">
  <h1 class="h4 fw-bold mb-0 page-title">
    <i class="fa-solid fa-clipboard-list me-2"></i>سجل التدقيق
  </h1>
  <button class="btn btn-sm btn-outline-secondary export-btn">
    <i class="fa-solid fa-file-export me-1"></i>تصدير
  </button>
</div>

<!-- Filter -->
<div class="card border-0 shadow-sm mb-4 filter-card">
  <div class="card-body p-3">
    <div class="row g-2">
      <div class="col-12 col-md-4">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-light border-end-0">
            <i class="fa-solid fa-magnifying-glass text-muted"></i>
          </span>
          <input type="text" class="form-control border-start-0" placeholder="بحث في الأحداث..." />
        </div>
      </div>
      <div class="col-6 col-md-2">
        <input type="date" class="form-control form-control-sm" placeholder="من تاريخ" />
      </div>
      <div class="col-6 col-md-2">
        <input type="date" class="form-control form-control-sm" placeholder="إلى تاريخ" />
      </div>
      <div class="col-12 col-md-2">
        <select class="form-select form-select-sm">
          <option value="">كل الإجراءات</option>
          <option>إنشاء</option>
          <option>تعديل</option>
          <option>حذف</option>
          <option>تسجيل دخول</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Sample Audit Log Entries -->
<div class="card border-0 shadow-sm logs-card">
  @for (log of sampleLogs; track log.id) {
    <div class="log-entry border-bottom py-3 d-flex align-items-start gap-3">
      <div class="flex-shrink-0">
        <span class="log-badge rounded-pill"
          [class.log-create]="log.action === 'إنشاء'"
          [class.log-edit]="log.action === 'تعديل'"
          [class.log-delete]="log.action === 'حذف'"
          [class.log-login]="log.action === 'دخول'">
          <i class="fa-solid" [class.fa-plus]="log.action === 'إنشاء'"
            [class.fa-pen]="log.action === 'تعديل'"
            [class.fa-trash]="log.action === 'حذف'"
            [class.fa-right-to-bracket]="log.action === 'دخول'"></i>
          {{ log.action }}
        </span>
      </div>
      <div class="flex-grow-1">
        <div class="small fw-semibold log-desc">{{ log.description }}</div>
        <div class="log-meta">
          <i class="fa-regular fa-user me-1"></i>{{ log.user }}
          <span class="log-sep">|</span>
          <i class="fa-regular fa-folder me-1"></i>{{ log.entity }}
          <span class="log-sep">|</span>
          <i class="fa-regular fa-clock me-1"></i>{{ log.timestamp }}
        </div>
      </div>
    </div>
  }
</div>
